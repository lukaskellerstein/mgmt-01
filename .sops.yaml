# Fleet SOPS policy — one place that decides how every secret in this repo is encrypted.
# See docs/secrets.md for the full strategy. SOPS walks up from a file's directory to the
# nearest .sops.yaml, so this root file governs the whole repo; do NOT add per-file
# .sops.yaml overrides (they would silently shadow these recipients).
#
# Recipients (age PUBLIC keys — the matching PRIVATE keys stay OFF the repo). These are the
# SAME two fleet recipients used across the fleet, so your existing fleet key decrypts here too:
#   age1fgfw…z4rjnud  fleet/workstation key  (~/.config/sops/age/keys.txt — every operator)
#   age1mpng…s4w6hg6  break-glass key        (offline; recovery only — never stored next to the fleet key)
# Both keys can decrypt every secret, so a lost workstation key never locks the fleet out.
# After changing recipients here, run: ./scripts/secrets.py rekey
#
# Secrets are co-located with the chart that consumes them: cluster/<tier>/<chart>/<name>.enc.yaml.
# creation_rules are evaluated top-down; the FIRST path_regex match wins. The cloudflared rule
# MUST come first — otherwise the broader cluster/ rule below (which only encrypts data/stringData)
# would match the helm-secrets values overlay and leave its token plaintext.
creation_rules:
  # cloudflared — a Helm values overlay rendered into a Secret by the chart, decrypted at deploy
  # via helm-secrets (`-f secrets://...`). The key is tunnel.token (not data/stringData) → no
  # encrypted_regex, so the WHOLE file's values are encrypted. Keys stay readable.
  - path_regex: cluster/infra/cloudflared/secrets\.enc\.yaml$
    age: >-
      age1fgfwws7708s2xk0m99ftrajd98py9r62qnldvkklvs4tx5knz3zs4rjnud,
      age1mpng9vq3ae3ek6c4l0tes05s8um8yv3lg6j7a2xdwy786vrzap8s4w6hg6

  # All other co-located secrets are real k8s Secret manifests applied out of band with
  # `./scripts/secrets.py apply`: encrypt only data/stringData so apiVersion/kind/metadata stay
  # readable for clean diffs.
  - path_regex: cluster/.*\.enc\.yaml$
    encrypted_regex: ^(data|stringData)$
    age: >-
      age1fgfwws7708s2xk0m99ftrajd98py9r62qnldvkklvs4tx5knz3zs4rjnud,
      age1mpng9vq3ae3ek6c4l0tes05s8um8yv3lg6j7a2xdwy786vrzap8s4w6hg6

# Garage S3 access key for rancher-backup.
# Source: the Key ID / Secret printed by `garage key create fleet-rw` (bootstrap §3).
# Consumed by the Backup in fleet/local/rancher-backup/resources.yaml.
# Wave 2: fill AFTER Garage is initialised and the key exists.
apiVersion: v1
kind: Secret
metadata:
  name: garage-s3-creds
  namespace: cattle-resources-system
type: Opaque
stringData:
  accessKey: "REPLACE_garage_access_key"
  secretKey: "REPLACE_garage_secret_key"

# Encryption config for rancher-backup (encrypts the Backup contents at rest in Garage).
# Referenced as encryptionConfigSecretName: backup-encryption in resources.yaml.
# Generate the key:  head -c 32 /dev/urandom | base64
# Wave 1: can be created before Garage is initialised.
apiVersion: v1
kind: Secret
metadata:
  name: backup-encryption
  namespace: cattle-resources-system
type: Opaque
stringData:
  encryption-provider-config.yaml: |
    apiVersion: apiserver.config.k8s.io/v1
    kind: EncryptionConfiguration
    resources:
      - resources:
          - secrets
        providers:
          - aescbc:
              keys:
                - name: key1
                  secret: REPLACE_base64_32_byte_key
          - identity: {}

# Thanos object-storage config → Garage bucket `thanos`.
# Referenced as existingSecret: thanos-objstore (key objstore.yml) in
# values/monitoring.yaml (thanos sidecar).
# Wave 2: fill the access/secret keys AFTER Garage is initialised.
apiVersion: v1
kind: Secret
metadata:
  name: thanos-objstore
  namespace: cattle-monitoring-system
type: Opaque
stringData:
  objstore.yml: |
    type: S3
    config:
      bucket: thanos
      endpoint: garage-s3.object-store.svc:3900
      insecure: true
      access_key: "REPLACE_garage_access_key"
      secret_key: "REPLACE_garage_secret_key"
      region: garage

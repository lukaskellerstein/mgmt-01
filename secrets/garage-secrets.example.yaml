# Garage cluster secrets — RPC mesh secret + admin API token.
# Generate both with: openssl rand -hex 32
# Consumed by the garage StatefulSet (envFrom) defined in values/garage.yaml.
# Wave 1: can be created BEFORE Garage is initialised.
apiVersion: v1
kind: Secret
metadata:
  name: garage-secrets
  namespace: object-store
type: Opaque
stringData:
  GARAGE_RPC_SECRET: "REPLACE_openssl_rand_hex_32"
  GARAGE_ADMIN_TOKEN: "REPLACE_openssl_rand_hex_32"

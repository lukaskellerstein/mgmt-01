# Garage S3 access key for Loki chunk storage (bucket `loki`).
# Loki's S3 client falls back to the AWS SDK env chain, so the keys are provided
# as AWS_* env via extraEnvFrom in fleet/local/logging/fleet.yaml.
# Wave 2: fill AFTER Garage is initialised.
apiVersion: v1
kind: Secret
metadata:
  name: loki-s3-creds
  namespace: cattle-logging-system
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_garage_access_key"
  AWS_SECRET_ACCESS_KEY: "REPLACE_garage_secret_key"

# Cloudflare Tunnel token for the cloudflared Helm release.
# Source: the Cloudflare Zero Trust dashboard tunnel token (docs/manual-setup.md §5).
# Consumed by fleet/local/cloudflared/fleet.yaml via helm.valuesFrom (secretKeyRef
# tunnel-token, key values.yaml) — so the body is a Helm values fragment, not a bare token.
# Wave 1: created right after the tunnel exists.
apiVersion: v1
kind: Secret
metadata:
  name: tunnel-token
  namespace: cloudflared
type: Opaque
stringData:
  values.yaml: |
    cloudflare:
      tunnel_token: "REPLACE_cloudflared_tunnel_token"

# SOPS-encrypted Helm values overlay for the cloudflared tunnel token.
# Helmfile decrypts this at deploy time (helm-secrets) and merges it over values/cloudflared.yaml.
#
#   cp values/secrets/cloudflared-token.example.yaml values/secrets/cloudflared-token.enc.yaml
#   sops values/secrets/cloudflared-token.enc.yaml     # paste the real token, saved encrypted
#
# (.gitignore keeps *.enc.yaml plaintext out of git; the encrypted file is safe to commit.)
cloudflare:
  tunnel_token: "REPLACE_WITH_CLOUDFLARE_TUNNEL_TOKEN"

# Recurring encrypted Backup → Garage bucket `rancher-backup`.
# Wrapped in `bedag/raw` so the Backup CR deploys with the rest. Depends on the
# rancher-backup operator (and its CRDs) — Helmfile `needs:` enforces that order.
#
# The two Secrets it references are applied out of band via SOPS (Helm must not own them):
#   - garage-s3-creds   -> secrets/garage-s3-creds.enc.yaml
#   - backup-encryption -> secrets/backup-encryption.enc.yaml
# Run `make secrets-apply` before this Backup first fires. See docs/bootstrap.md §1.
resources:
  - apiVersion: resources.cattle.io/v1
    kind: Backup
    metadata:
      name: rancher-nightly
    spec:
      resourceSetName: rancher-resource-set
      schedule: "0 2 * * *"            # 02:00 daily
      retentionCount: 14
      encryptionConfigSecretName: backup-encryption    # create per Rancher docs
      storageLocation:
        s3:
          credentialSecretName: garage-s3-creds
          credentialSecretNamespace: cattle-resources-system
          bucketName: rancher-backup
          endpoint: garage-s3.object-store.svc:3900     # in-cluster Garage
          insecureTLSSkipVerify: true                   # plain-HTTP in-cluster S3
          endpointCA: ""
          region: garage

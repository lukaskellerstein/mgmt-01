# Loki values — single-binary, chunks in Garage bucket `loki`.
# Downstream clusters ship logs here via Grafana Alloy (helmfile.downstream.yaml).
# View in the same Grafana as metrics → one observability pane for the fleet.
deploymentMode: SingleBinary
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: s3
    bucketNames:
      chunks: loki
      ruler: loki
      admin: loki
    s3:
      endpoint: garage-s3.object-store.svc:3900
      region: garage
      s3ForcePathStyle: true
      insecure: true
      # Keys are NOT set here — Loki's S3 client falls back to the AWS env chain.
      # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY come from the loki-s3-creds Secret
      # (applied out of band via SOPS) through singleBinary.extraEnvFrom below.
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index: { prefix: index_, period: 24h }
singleBinary:
  replicas: 1
  # Garage S3 creds from the out-of-band Secret (secrets/loki-s3-creds.enc.yaml).
  extraEnvFrom:
    - secretRef:
        name: loki-s3-creds
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { memory: 1Gi }
# disable the heavy microservice components on a single small box
backend:  { replicas: 0 }
read:     { replicas: 0 }
write:    { replicas: 0 }
chunksCache:
  enabled: false              # save RAM on the N355

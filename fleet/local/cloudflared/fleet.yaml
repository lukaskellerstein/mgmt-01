# cloudflared tunnel → rancher.cellarwood.org (+ grafana.cellarwood.org if exposed).
# Run as Cloudflare's official remote-managed Helm chart, so it's GitOps'd the same way
# as every other workload in this repo (helm: block, no hand-written Deployment).
#
# This is a *dashboard-managed* (token) tunnel: the hostname→service routing lives in the
# Cloudflare Zero Trust dashboard (manual-setup.md §5), not in Git. The chart only takes the
# token as a plain Helm value (no existingSecret option), so we keep it OUT OF GIT by
# overlaying it at deploy time from the SOPS-encrypted `tunnel-token` Secret via valuesFrom.
defaultNamespace: cloudflared
helm:
  repo: https://cloudflare.github.io/helm-charts
  chart: cloudflare-tunnel-remote
  version: "0.1.2"                 # [verify] latest at time of writing
  releaseName: cloudflared
  values:
    replicaCount: 2               # connection redundancy
    image:
      repository: cloudflare/cloudflared
      tag: "__REPLACE__"          # [verify] pin a tag for GitOps reproducibility
    resources:
      requests: { cpu: 20m, memory: 64Mi }
      limits:   { memory: 128Mi }
  # tunnel_token overlaid from the out-of-band Secret (SOPS) — never committed.
  # The Secret holds a values.yaml fragment: cloudflare.tunnel_token: <token>.
  valuesFrom:
    - secretKeyRef:
        name: tunnel-token
        namespace: cloudflared    # [verify] namespace the Fleet agent reads the Secret from
        key: values.yaml

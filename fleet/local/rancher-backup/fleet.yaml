# rancher-backup — protects Rancher's own state (CRDs, settings, users, cluster regs).
# Backs up to Garage via an S3 target. Cheapest high-value addition on the box.
defaultNamespace: cattle-resources-system
helm:
  repo: https://charts.rancher.io
  chart: rancher-backup
  version: "__REPLACE__"          # [verify] match your Rancher 2.14.x line
  releaseName: rancher-backup
  values:
    # operator is tiny; defaults are fine
---
# After the operator is up, create a Backup CR pointing at Garage (see resources.yaml).

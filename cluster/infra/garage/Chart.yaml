apiVersion: v2
name: garage
description: >-
  Garage — EU (Deuxfleurs), S3-compatible object store for mgmt-01. One store serving
  rancher-backup, Thanos long-term metrics and Loki chunks (buckets: rancher-backup, thanos,
  loki, backups). First-party chart (Garage ships no upstream chart). replication_factor=1 →
  single-node, NON-DURABLE (Decision 9); mirror critical buckets off-site for real DR.
type: application

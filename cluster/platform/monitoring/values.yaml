# Overrides for the upstream kube-prometheus-stack chart. Keyed under the dependency name.
# Deploy with release name `rancher-monitoring` so the Grafana Service is
# rancher-monitoring-grafana.cattle-monitoring-system (referenced by docs/manual-setup.md §5).
kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 6h             # keep local short; Thanos holds the long tail in Garage
      # Accept remote-write from downstream agents:
      enableRemoteWriteReceiver: true
      resources:
        requests: { cpu: 200m, memory: 1Gi }
        limits:   { memory: 3Gi }
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path     # [verify]
            resources: { requests: { storage: 20Gi } }
      thanos:
        objectStorageConfig:
          existingSecret:
            name: thanos-objstore
            key: objstore.yml
  grafana:
    enabled: true
    defaultDashboardsEnabled: true
    # exposed via cloudflared (add a public hostname grafana.cellarwood.org if wanted)
  # Trim what a single management box doesn't need to scrape:
  nodeExporter: { enabled: true }
  kubeEtcd: { enabled: true }
  alertmanager:
    alertmanagerSpec:
      resources:
        requests: { cpu: 50m, memory: 128Mi }
